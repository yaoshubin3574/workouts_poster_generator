name: Workouts Poster Generator

on:
  workflow_dispatch:
    inputs:
      lat:
        description: '📍 中心点纬度 (例如: 35.30500318)'
        required: true
        default: '35.30500318'
      lon:
        description: '📍 中心点经度 (例如: 113.93085256)'
        required: true
        default: '113.93085256'
      distance:
        description: '📏 涵盖范围距离(米) (例如: 18000)'
        required: true
        default: '18000'
      city:
        description: '🏙️ 城市名称 (例如: 新乡市)'
        required: true
        default: '新乡市'
      province:
        description: '🗺️ 省份名称 (例如: 河南省)'
        required: true
        default: '河南省'

jobs:
  build_map:
    runs-on: ubuntu-latest
    
    # 强制使用最新的 Node.js 24 运行环境，消除黄色警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 获取仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pandas pyarrow duckdb Pillow terraink-py

    - name: 下载最新 data.db
      run: |
        wget https://raw.githubusercontent.com/yaoshubin3574/workouts_page/master/run_page/data.db -O data.db

    - name: 转换 data.db 到 data.parquet
      run: python convert_db.py


    - name: 生成 SVG 海报
      run: |
        python generate_poster.py \
          --lat ${{ github.event.inputs.lat }} \
          --lon ${{ github.event.inputs.lon }} \
          --distance ${{ github.event.inputs.distance }} \
          --city "${{ github.event.inputs.city }}" \
          --province "${{ github.event.inputs.province }}"

    # 💥 新增步骤：运行我们刚才新建的数据导出脚本 💥
    - name: 📊 导出区域运动数据 CSV
      run: |
        python export_regional_data.py \
          --lat ${{ github.event.inputs.lat }} \
          --lon ${{ github.event.inputs.lon }} \
          --distance ${{ github.event.inputs.distance }}

    - name: 🖼️ 渲染 600ppi 高清 PNG
      run: |
        sudo apt-get update
        sudo apt-get install -y inkscape
        inkscape --export-type=png --export-filename=colorful-map.png --export-dpi=600 colorful-map.svg

    # 💥 修改打包步骤：把 CSV 文件也加进下载清单里 💥
    - name: 📦 打包图片和数据提供下载
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.city }}-Map-and-Data
        path: |
          colorful-map.svg
          colorful-map.png
          regional_sports_data.csv
        retention-days: 7
