name: Workouts Poster Generator

on:
  workflow_dispatch:
    inputs:
      lon:
        description: '中心点经度'
        required: true
        default: '113.93085256'
      lat:
        description: '中心点纬度'
        required: true
        default: '35.30500318'
      distance:
        description: '距离(米)'
        required: true
        default: '18000'
      city:
        description: '城市名称'
        required: true
        default: '新乡市'

jobs:
  build_map:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 获取仓库代码
      uses: actions/checkout@v4

    - name: 设置 Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pandas pyarrow duckdb Pillow terraink-py

    - name: 下载最新 data.db
      run: |
        wget https://raw.githubusercontent.com/yaoshubin3574/workouts_page/master/run_page/data.db -O data.db

    - name: 转换 data.db 到 data.parquet
      run: python convert_db.py

    - name: 生成 SVG 海报
      run: |
        python generate_poster.py \
          --lat ${{ github.event.inputs.lat }} \
          --lon ${{ github.event.inputs.lon }} \
          --distance ${{ github.event.inputs.distance }} \
          --city "${{ github.event.inputs.city }}"

    - name: 导出区域运动数据 CSV
      run: |
        python export_regional_data.py \
          --lat ${{ github.event.inputs.lat }} \
          --lon ${{ github.event.inputs.lon }} \
          --distance ${{ github.event.inputs.distance }}

    - name: 渲染 600ppi 高清 PNG
      run: |
        sudo apt-get update
        sudo apt-get install -y inkscape
        inkscape --export-type=png --export-filename=colorful-map.png --export-dpi=600 colorful-map.svg

    - name: 打包图片和数据提供下载
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.city }}-Map-and-Data
        path: |
          colorful-map.svg
          colorful-map.png
          regional_sports_data.csv
        retention-days: 7
